<!DOCTYPE html>
<html lang="en">
  <head>
    <link
      rel="canonical"
      href="https://creatorpromote.com/portalmasterofgames/live"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Master Of Games — Official Site | Live</title>
    <meta
      name="description"
      content="Track Portal Master Of Games live YouTube statistics in real-time! See current subscribers, total views, latest uploads, and all important channel metrics automatically updated. Stay informed about the channel's growth, popular videos, trending content, and milestones. Perfect for fans, collaborators, and anyone following Portal Master Of Games closely."
    />
    <link rel="stylesheet" href="css/live.css" />
    <meta
      property="og:title"
      content="Portal Master Of Games Official Site | Live Status"
    />
    <meta
      property="og:description"
      content="Portal Master Of Games Live Status, Live subscriber count, Live Views count and Live Uploads count. See it all Live here"
    />
    <meta
      property="og:image"
      content="https://creatorpromote.com/portalmasterofgames/images/banner.png"
    />
    <meta
      property="og:url"
      content="https://creatorpromote.com/portalmasterofgames/contactme"
    />
    <meta property="og:type" content="website" />
  </head>
<body>
  <main class="container">
    <div class="profile">
      <img src="images/bg.png" alt="Portal Master Of Games profile picture" />
      <div>
        <p class="tag">YouTube Channel</p>
        <h1>Portal Master Of Games</h1>
      </div>
    </div>

    <div class="live-row">
      <span id="liveDot" class="dot offline"></span>
      <span id="liveStatus">Checking status...</span>
    </div>

<div class="stats">
  <div class="stat-card">
    <div class="label">Subscribers</div>
    <div class="number" id="subscribers">0</div>
  </div>

  <div class="stat-card">
    <div class="label">Views</div>
    <div class="number" id="views">0</div>
  </div>

  <div class="stat-card">
    <div class="label">Videos</div>
    <div class="number" id="videos">0</div>
  </div>

  <div class="stat-card">
    <div class="label">Status</div>
    <div class="number small-number" id="liveStatus">Checking...</div>
  </div>

  <div class="stat-card">
    <div class="label">Last Update</div>
    <div class="number small-number" id="updated">--:--</div>
  </div>

  <div class="stat-card">
    <div class="label">Clock</div>
    <div class="number small-number" id="clock">--:--</div>
  </div>
</div>

<div class="goal-box">
  <div class="goal-top">
    <span>Next Subscriber Goal</span>
    <strong id="goalText">Loading...</strong>
  </div>
  <div class="goal-bar">
    <div id="goalFill"></div>
  </div>
</div>

    <div class="actions">
      <a href="https://www.youtube.com/@PMOG" target="_blank">Visit Channel</a>
    </div>
  </main>

  <script src="js/live.js"></script>
</body>
</html>
